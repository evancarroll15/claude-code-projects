<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xs and Os</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      color: #e0e0e0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #aaa;
      transition: color 0.3s;
    }

    #status.winner { color: #f9c74f; font-weight: bold; }
    #status.draw   { color: #90e0ef; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #ef476f; }
    .cell.o { color: #06d6a0; }

    .cell.win { background: #0f3460; box-shadow: 0 0 18px 4px rgba(249,199,79,0.35); }

    #reset {
      margin-top: 2rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #scores {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    .score-box { text-align: center; }
    .score-box span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score span { color: #ef476f; }
    .score-box.o-score span { color: #06d6a0; }
    .score-box.draw-score span { color: #90e0ef; }
  </style>
</head>
<body>
  <h1>Xs &amp; Os</h1>

  <div id="scores">
    <div class="score-box x-score">X <span id="xScore">0</span></div>
    <div class="score-box draw-score">Draws <span id="drawScore">0</span></div>
    <div class="score-box o-score">O <span id="oScore">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const scores = { X: 0, O: 0, D: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const xScore  = document.getElementById('xScore');
    const oScore  = document.getElementById('oScore');
    const drawScore = document.getElementById('drawScore');

    function init() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`${current}'s turn`, '');
    }

    function setStatus(text, cls) {
      status.textContent = text;
      status.className   = cls;
    }

    function checkWin(player) {
      return WINS.find(line => line.every(i => board[i] === player)) || null;
    }

    function handleClick(e) {
      const cell = e.currentTarget;
      const i    = +cell.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const winLine = checkWin(current);
      if (winLine) {
        winLine.forEach(idx => cells[idx].classList.add('win'));
        setStatus(`${current} wins!`, 'winner');
        scores[current]++;
        updateScores();
        over = true;
        return;
      }

      if (board.every(Boolean)) {
        setStatus("It's a draw!", 'draw');
        scores.D++;
        updateScores();
        over = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`, '');
    }

    function updateScores() {
      xScore.textContent    = scores.X;
      oScore.textContent    = scores.O;
      drawScore.textContent = scores.D;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
